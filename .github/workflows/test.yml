
name: Build and Test Game

on:
  push:
    branches:
      - github-action
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Download Mesa3D (Software OpenGL Renderer)
        run: |
          curl -L -o mesa3d.7z https://github.com/pal1000/mesa-dist-win/releases/download/25.0.0/mesa3d-25.0.0-release-msvc.7z
          7z x mesa3d.7z -o"$env:GITHUB_WORKSPACE/mesa3d"
          del mesa3d.7z


      - name: Verify Mesa3D Files
        shell: powershell
        run: |
          Get-ChildItem -Path "$env:GITHUB_WORKSPACE\mesa3d\x64"


      - name: Set Up Mesa3D Environment
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "MESA_GL_VERSION_OVERRIDE=4.6"
          Add-Content -Path $env:GITHUB_ENV -Value "MESA_GLSL_VERSION_OVERRIDE=460"
          Add-Content -Path $env:GITHUB_ENV -Value "GALLIUM_DRIVER=llvmpipe"
          Add-Content -Path $env:GITHUB_ENV -Value "PATH=$env:GITHUB_WORKSPACE\mesa3d\x64;$env:PATH"
          echo "MESA_GL_VERSION_OVERRIDE=4.6" >> $env:GITHUB_ENV
          echo "MESA_GLSL_VERSION_OVERRIDE=460" >> $env:GITHUB_ENV
          echo "GALLIUM_DRIVER=llvmpipe" >> $env:GITHUB_ENV
          echo "PATH=$env:GITHUB_WORKSPACE\mesa3d\x64;$env:PATH" >> $env:GITHUB_ENV


          - name: Create Symbolic Links for Mesa3D DLLs
            shell: powershell
            run: |
              if (Test-Path "$env:GITHUB_WORKSPACE\mesa3d\x64\opengl32.dll") {
                New-Item -ItemType SymbolicLink -Path opengl32.dll -Target "$env:GITHUB_WORKSPACE\mesa3d\x64\opengl32.dll"
              } else {
                Write-Host "❌ opengl32.dll not found!"
                exit 1
              }

              if (Test-Path "$env:GITHUB_WORKSPACE\mesa3d\x64\libglapi.dll") {
                New-Item -ItemType SymbolicLink -Path libglapi.dll -Target "$env:GITHUB_WORKSPACE\mesa3d\x64\libglapi.dll"
              } else {
                Write-Host "❌ libglapi.dll not found!"
                exit 1
              }

      - name: Verify CMake Version
        run: cmake --version

      - name: Set Up MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (Optional but Recommended)
        uses: seanmiddleditch/gha-setup-ninja@v3

      - name: Configure CMake
        run: cmake -B build -G "Ninja"

      - name: Build Game
        run: cmake --build build --config Release

      - name: Run Shader Tests
        run: |
          powershell -ExecutionPolicy Bypass -File ./scripts/run-all.ps1 -tests shader-test
          powershell -ExecutionPolicy Bypass -File ./scripts/compare-all.ps1 -tests shader-test
